<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="search-section">
        <div class="search-box">
            <input class="search-bar" type="text" placeholder="search city">
            <button class="search-btn">search</button>
        </div>


    </section>
    <section class="weather-display">
        <div class="city">NEW YORK</div>
        <div class="tempreture">
            <img class="icon" src="assets/weather-color-sun-cloud-svgrepo-com.svg" alt="">
            25°C

        </div>
        <div class="info">
            <div class="weather-description">rainy</div>
            <div class="weather-display">

                <div class="humidity">Humidity-99%</div>
                <div class="wind-speed">wind-speed- 20kmph</div>
            </div>
        </div>

    </section>
    <section class="date-time"></section>
    <script src="script.js"></script>
</body>

</html>
